<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flauta Dulce - ESP32</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }

:root {
  --bg-main: #0f172a;
  --bg-card: #1e293b;
  --border-card: #334155;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --accent-note: #38bdf8;
  --green-led: #10b981;
  --red-led: #ef4444;
}

body {
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.app-container {
  width: 100%;
  max-width: 820px;
  padding: 24px 16px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Cabecera Estándar ── */
header {
  text-align: center;
  margin-bottom: 20px;
}
header h1 {
  font-size: 2.1rem;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -0.5px;
}
header p {
  font-size: 0.95rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ── Barra de controles superior ── */
.top-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 28px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(15, 23, 42, 0.7);
  border: 1px solid var(--border-card);
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ef4444;
  transition: background 0.3s;
}
.status-dot.on {
  background: var(--green-led);
  box-shadow: 0 0 8px var(--green-led);
}

/* Botón principal estándar */
.btn-start {
  padding: 10px 32px;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  color: #ffffff;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  transition: all 0.2s ease;
}
.btn-start:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}
.btn-start:active { transform: scale(0.98); }
.btn-start.active {
  background: #dc2626;
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.35);
}

/* ── Panel Principal Lado a Lado ── */
.workshop-stage {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: stretch;
}

@media (max-width: 640px) {
  .workshop-stage {
    grid-template-columns: 1fr;
  }
}

/* ── Tarjetas Estándar ── */
.card-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ── Tarjeta Izquierda: Nota Detectada ── */
.note-panel {
  text-align: center;
  min-height: 360px;
}
.note-panel-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 20px;
}

/* Contenedor interior nota */
.note-box {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 14px;
  width: 100%;
  max-width: 240px;
  padding: 32px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.note-name {
  font-size: 4.8rem;
  font-weight: 800;
  color: var(--accent-note);
  min-height: 5.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.note-name.pop {
  animation: pop 0.22s ease;
}
@keyframes pop {
  0%   { transform: scale(0.9); opacity: 0.7; }
  60%  { transform: scale(1.06); }
  100% { transform: scale(1); opacity: 1; }
}

.freq-display {
  font-size: 1rem;
  color: var(--text-muted);
  margin-top: 8px;
  font-weight: 500;
}

/* Leyenda inferior limpia */
.legend-mini {
  display: flex;
  gap: 16px;
  margin-top: 24px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.dot-legend {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 6px;
}

/* ── Tarjeta Derecha: Flauta Realista ── */
.flute-panel {
  padding: 20px 12px;
}
.flute-svg-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════
// Tabla de notas y frecuencias (flauta soprano, octavas 5-6-7)
// ═══════════════════════════════════════════════════════
const NOTE_TABLE = [
  { name: "Do",    freq: 523.25  },
  { name: "Do#",   freq: 554.37  },
  { name: "Re",    freq: 587.33  },
  { name: "Re#",   freq: 622.25  },
  { name: "Mi",    freq: 659.26  },
  { name: "Fa",    freq: 698.46  },
  { name: "Fa#",   freq: 739.99  },
  { name: "Sol",   freq: 783.99  },
  { name: "Sol#",  freq: 830.61  },
  { name: "La",    freq: 880.00  },
  { name: "La#",   freq: 932.33  },
  { name: "Si",    freq: 987.77  },
  { name: "Do''",  freq: 1046.50 },
  { name: "Do#''", freq: 1108.73 },
  { name: "Re''",  freq: 1174.66 },
  { name: "Re#''", freq: 1244.51 },
  { name: "Mi''",  freq: 1318.51 },
  { name: "Fa''",  freq: 1396.91 },
  { name: "Fa#''", freq: 1479.98 },
  { name: "Sol''", freq: 1567.98 },
  { name: "Sol#''",freq: 1661.22 },
  { name: "La''",  freq: 1760.00 },
  { name: "La#''", freq: 1864.66 },
  { name: "Si''",  freq: 1975.53 },
  { name: "Do'''", freq: 2093.00 }
];

// ═══════════════════════════════════════════════════════
// Tabla de digitación [h1,h2,h3,h4,h5,h6,h7,h8(portavoz)]
// Coincidente con digitación barroca exacta (0=abierto, 1=cerrado, 2=medio)
// ═══════════════════════════════════════════════════════
const FINGERINGS = {
  "Do":     [1,1,1,1,1,1,1,1],
  "Do#":    [1,1,1,1,1,1,2,1],
  "Re":     [1,1,1,1,1,1,0,1],
  "Re#":    [1,1,1,1,1,2,0,1],
  "Mi":     [1,1,1,1,1,0,0,1],
  "Fa":     [1,1,1,1,0,1,1,1],
  "Fa#":    [1,1,1,0,1,1,0,1],
  "Sol":    [1,1,1,0,0,0,0,1],
  "Sol#":   [1,1,0,1,1,2,0,1],
  "La":     [1,1,0,0,0,0,0,1],
  "La#":    [1,0,1,1,0,0,0,1],
  "Si":     [1,0,0,0,0,0,0,1],
  "Do''":   [0,1,0,0,0,0,0,1],
  "Do#''":  [1,1,0,0,0,0,0,0],
  "Re''":   [0,1,0,0,0,0,0,0],
  "Re#''":  [0,1,1,1,1,2,0,0],
  "Mi''":   [1,1,1,1,1,0,0,2],
  "Fa''":   [1,1,1,1,0,1,0,2],
  "Fa#''":  [1,1,1,0,1,0,0,2],
  "Sol''":  [1,1,1,0,0,0,0,2],
  "Sol#''": [1,1,0,1,0,0,0,2],
  "La''":   [1,1,0,0,0,0,0,2],
  "La#''":  [1,1,0,1,1,1,0,2],
  "Si''":   [1,1,0,1,1,0,0,2],
  "Do'''":  [1,0,0,1,1,0,0,2]
};

const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const btnStart    = document.getElementById('btnStart');
const noteNameEl  = document.getElementById('noteName');
const freqDisplay = document.getElementById('freqDisplay');

function updateFingering(noteName) {
  const fg = noteName ? FINGERINGS[noteName] : null;

  for (let holeIdx = 0; holeIdx <= 7; holeIdx++) {
    const outerEl = document.getElementById(`hole_${holeIdx}_outer`);
    const halfEl  = document.getElementById(`hole_${holeIdx}_half`);
    const innerEl = document.getElementById(`hole_${holeIdx}_inner`);
    if (!outerEl || !halfEl || !innerEl) continue;

    const val = fg ? (holeIdx === 0 ? fg[7] : fg[holeIdx - 1]) : 0;

    outerEl.removeAttribute('filter');

    if (val === 1) {
      outerEl.setAttribute('fill', '#10b981');
      outerEl.setAttribute('stroke', '#059669');
      outerEl.setAttribute('filter', 'url(#glowG)');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#d1fae5');
    } else if (val === 2) {
      outerEl.setAttribute('fill', '#1e100a');
      outerEl.setAttribute('stroke', '#ef4444');
      outerEl.setAttribute('filter', 'url(#glowR)');
      halfEl.setAttribute('fill', '#ef4444');
      innerEl.setAttribute('fill', '#fecaca');
    } else {
      outerEl.setAttribute('fill', '#150a06');
      outerEl.setAttribute('stroke', '#875231');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#0d0502');
    }
  }
}

updateFingering(null);

// WebSocket
let ws = null;
let wsConnected = false;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    wsConnected = true;
    statusDot.classList.add('on');
    statusText.textContent = 'Conectado';
    ws.send(JSON.stringify({ type: 'register', device: 'browser' }));
  };

  ws.onclose = () => {
    wsConnected = false;
    statusDot.classList.remove('on');
    statusText.textContent = 'Desconectado';
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => ws.close();
}
connectWS();

function sendNote(name) {
  if (ws && wsConnected) ws.send(name);
}

// ═══════════════════════════════════════════════════════
// Audio & Detección de Tono Simple (Autocorrelación Básica)
// ═══════════════════════════════════════════════════════
let audioCtx, analyser, micStream, isListening = false;
const BUFFER_SIZE = 2048;
let dataBuffer = new Float32Array(BUFFER_SIZE);

// Función sencilla para encontrar la frecuencia del sonido por Autocorrelación
function detectarTonoSimple(buffer, sampleRate) {
  // 1. Ignorar si hay silencio o ruido muy bajo
  let rms = 0;
  for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
  if (Math.sqrt(rms / buffer.length) < 0.012) return -1;

  // 2. Buscar el período de repetición fundamental (flauta soprano: ~450 Hz a ~2150 Hz)
  const minPeriod = Math.floor(sampleRate / 2200);
  const maxPeriod = Math.floor(sampleRate / 450);

  let bestCorr = 0;
  let bestPeriod = -1;

  for (let period = minPeriod; period <= maxPeriod; period++) {
    let corr = 0;
    for (let i = 0; i < maxPeriod; i++) {
      corr += buffer[i] * buffer[i + period];
    }
    if (corr > bestCorr) {
      bestCorr = corr;
      bestPeriod = period;
    }
  }

  // Si hay suficiente correlación, devolver la frecuencia encontrada
  return bestPeriod > 0 ? sampleRate / bestPeriod : -1;
}

// Buscar cuál es la nota musical más cercana en nuestra tabla
function matchNote(freq) {
  let best = null, bestDiff = Infinity;
  for (const n of NOTE_TABLE) {
    const diff = Math.abs(freq - n.freq);
    if (diff < bestDiff) {
      bestDiff = diff;
      best = n;
    }
  }
  // Tolerancia del 4% en frecuencia respecto a la nota teórica
  if (best && bestDiff < best.freq * 0.04) return { note: best };
  return null;
}

let stableCount = 0;
let lastCandidate = '';
let lastSentNote  = '';

function detect() {
  if (!isListening) return;
  analyser.getFloatTimeDomainData(dataBuffer);

  const freq = detectarTonoSimple(dataBuffer, audioCtx.sampleRate);
  if (freq > 400 && freq < 2200) {
    const result = matchNote(freq);
    if (result) {
      const { note } = result;

      if (note.name === lastCandidate) {
        stableCount++;
      } else {
        stableCount = 1;
        lastCandidate = note.name;
      }

      // Estabilizar tras 2 lecturas consecutivas para evitar parpadeos
      if (stableCount >= 2) {
        if (noteNameEl.textContent !== note.name) {
          noteNameEl.textContent = note.name;
          noteNameEl.classList.remove('pop');
          void noteNameEl.offsetWidth;
          noteNameEl.classList.add('pop');
        }
        freqDisplay.textContent = freq.toFixed(1) + ' Hz';

        updateFingering(note.name);

        if (note.name !== lastSentNote) {
          lastSentNote = note.name;
          sendNote(note.name);
        }
      }
    }
  }

  requestAnimationFrame(detect);
}

btnStart.addEventListener('click', async () => {
  if (!isListening) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = BUFFER_SIZE;
      source.connect(analyser);
      dataBuffer = new Float32Array(BUFFER_SIZE);

      isListening = true;
      btnStart.textContent = 'DETENER';
      btnStart.classList.add('active');
      requestAnimationFrame(detect);
    } catch (e) {
      alert('No se pudo acceder al micrófono: ' + e.message);
    }
  } else {
    isListening = false;
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    btnStart.textContent = 'INICIAR';
    btnStart.classList.remove('active');
    noteNameEl.textContent = '—';
    freqDisplay.textContent = '— Hz';
    updateFingering(null);
    stableCount = 0;
    lastCandidate = '';
    lastSentNote = '';
  }
});
</script>
</body>
</html>
