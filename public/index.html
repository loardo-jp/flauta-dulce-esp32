<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PFS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }

:root {
  --bg-main: #f4ebd0;
  --text-main: #3e2723;
  --text-muted: #795548;
  --primary: #6d4c41;
  --primary-hover: #4e342e;
  --accent-note: #a0522d;
  --green-led: #10b981;
  --red-led: #ef4444;
}

body {
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.app-container {
  width: 100%;
  max-width: 820px;
  padding: 24px 16px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  text-align: center;
  margin-bottom: 24px;
}
header h1 {
  font-size: 2.6rem;
  font-weight: 800;
  color: var(--text-main);
  letter-spacing: 1px;
}

.top-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 36px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #eae0c8;
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 0.85rem;
  color: var(--text-main);
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ef4444;
  transition: background 0.3s;
}
.status-dot.on {
  background: var(--green-led);
  box-shadow: 0 0 8px var(--green-led);
}

.btn-start {
  padding: 10px 32px;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  color: #ffffff;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(109, 76, 65, 0.25);
  transition: all 0.2s ease;
}
.btn-start:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}
.btn-start:active { transform: scale(0.98); }
.btn-start.active {
  background: #c62828;
  box-shadow: 0 4px 12px rgba(198, 40, 40, 0.35);
}

.workshop-stage {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: center;
}

@media (max-width: 640px) {
  .workshop-stage {
    grid-template-columns: 1fr;
  }
}

.note-panel {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.note-name {
  font-size: 6rem;
  font-weight: 800;
  color: var(--accent-note);
  min-height: 6.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.note-name.pop {
  animation: pop 0.22s ease;
}
@keyframes pop {
  0%   { transform: scale(0.9); opacity: 0.7; }
  60%  { transform: scale(1.06); }
  100% { transform: scale(1); opacity: 1; }
}

.freq-display {
  font-size: 1.2rem;
  color: var(--text-muted);
  margin-top: 12px;
  font-weight: 600;
}

.legend-mini {
  display: flex;
  gap: 16px;
  margin-top: 32px;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.dot-legend {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 6px;
}

.flute-panel {
  padding: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.flute-svg-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>PFS</h1>
  </header>

  <div class="top-controls">
    <button class="btn-start" id="btnStart">INICIAR</button>
  </div>

  <div class="workshop-stage">
    <div class="note-panel">
      <div class="note-name" id="noteName">—</div>
      <div class="freq-display" id="freqDisplay">— Hz</div>

      <div class="legend-mini">
        <span><span class="dot-legend" style="background:#10b981;"></span>Tapado</span>
        <span><span class="dot-legend" style="background:#ef4444;"></span>Medio</span>
        <span><span class="dot-legend" style="background:#f4ebd0; border:1px solid #795548;"></span>Abierto</span>
      </div>
    </div>

    <div class="flute-panel">
      <div class="flute-svg-wrap">
        <svg id="recorderSvg" viewBox="0 0 250 440" width="100%" style="max-width: 270px; height: auto;">
          <defs>
            <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#3e2723" />
              <stop offset="25%" stop-color="#6d4c41" />
              <stop offset="50%" stop-color="#8d6e63" />
              <stop offset="78%" stop-color="#5d4037" />
              <stop offset="100%" stop-color="#3e2723" />
            </linearGradient>

            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#4e342e" />
              <stop offset="50%" stop-color="#d7ccc8" />
              <stop offset="100%" stop-color="#3e2723" />
            </linearGradient>

            <filter id="glowG" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>

            <filter id="glowR" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <g transform="translate(18, 55)">
            <path d="M 24,0 C 36,0 38,12 38,24 L 35,95 L 13,95 L 10,24 C 10,12 12,0 24,0 Z" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="1.5" />
            <rect x="11" y="24" width="26" height="5" rx="1.5" fill="url(#ringGrad)" />
            <text x="24" y="-8" text-anchor="middle" fill="#5d4037" font-weight="700" font-size="11">P</text>
            <circle id="hole_0_outer" cx="24" cy="56" r="10" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
            <path id="hole_0_half" d="M 24,46 A 10,10 0 0 1 24,66 Z" fill="transparent" />
            <circle id="hole_0_inner" cx="24" cy="56" r="5" fill="#1b110e" />
          </g>

          <g transform="translate(45, 0)">
            <path d="M 98,10 C 105,8 116,8 123,10 L 129,48 L 92,48 Z" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="1.5" />
            <rect x="102" y="27" width="16" height="11" rx="2" fill="#2d1e18" stroke="#5d4037" stroke-width="1" />
            <polygon points="102,38 118,38 110,31" fill="#8d6e63" />
            <rect x="90" y="48" width="41" height="8" rx="2" fill="url(#ringGrad)" stroke="#3e2723" stroke-width="1" />

            <path d="M 93,56 L 128,56 L 122,382 L 99,382 Z" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="1.5" />
            <rect x="96" y="380" width="29" height="7" rx="2" fill="url(#ringGrad)" stroke="#3e2723" stroke-width="1" />
            <path d="M 97,387 C 91,404 88,414 88,422 L 133,422 C 133,414 130,404 124,387 Z" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="1.5" />
            <ellipse cx="110.5" cy="422" rx="22.5" ry="4.5" fill="#2d1e18" stroke="#5d4037" stroke-width="1.5" />

            <path d="M 106,58 L 108,380" stroke="rgba(255,255,255,0.18)" stroke-width="2.5" />

            <g transform="translate(110.5, 84)">
              <circle id="hole_1_outer" r="10" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_1_half" d="M 0,-10 A 10,10 0 0 1 0,10 Z" fill="transparent" />
              <circle id="hole_1_inner" r="5" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">1</text>
            </g>

            <g transform="translate(110.5, 126)">
              <circle id="hole_2_outer" r="10" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_2_half" d="M 0,-10 A 10,10 0 0 1 0,10 Z" fill="transparent" />
              <circle id="hole_2_inner" r="5" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">2</text>
            </g>

            <g transform="translate(110.5, 168)">
              <circle id="hole_3_outer" r="10" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_3_half" d="M 0,-10 A 10,10 0 0 1 0,10 Z" fill="transparent" />
              <circle id="hole_3_inner" r="5" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">3</text>
            </g>

            <g transform="translate(110.5, 210)">
              <circle id="hole_4_outer" r="9.5" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_4_half" d="M 0,-9.5 A 9.5,9.5 0 0 1 0,9.5 Z" fill="transparent" />
              <circle id="hole_4_inner" r="4.5" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">4</text>
            </g>

            <g transform="translate(110.5, 252)">
              <circle id="hole_5_outer" r="9.5" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_5_half" d="M 0,-9.5 A 9.5,9.5 0 0 1 0,9.5 Z" fill="transparent" />
              <circle id="hole_5_inner" r="4.5" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">5</text>
            </g>

            <g transform="translate(110.5, 294)">
              <circle id="hole_6_outer" r="9" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_6_half" d="M 0,-9 A 9,9 0 0 1 0,9 Z" fill="transparent" />
              <circle id="hole_6_inner" r="4" fill="#1b110e" />
              <text x="22" y="4" fill="#5d4037" font-weight="700" font-size="13">6</text>
            </g>

            <g transform="translate(113, 336)">
              <circle id="hole_7_outer" r="8.5" fill="#2d1e18" stroke="#8d6e63" stroke-width="2" />
              <path id="hole_7_half" d="M 0,-8.5 A 8.5,8.5 0 0 1 0,8.5 Z" fill="transparent" />
              <circle id="hole_7_inner" r="3.8" fill="#1b110e" />
              <text x="20" y="4" fill="#5d4037" font-weight="700" font-size="13">7</text>
            </g>
          </g>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
const NOTE_TABLE = [
  { name: "Do",    freq: 523.25  },
  { name: "Do#",   freq: 554.37  },
  { name: "Re",    freq: 587.33  },
  { name: "Re#",   freq: 622.25  },
  { name: "Mi",    freq: 659.26  },
  { name: "Fa",    freq: 698.46  },
  { name: "Fa#",   freq: 739.99  },
  { name: "Sol",   freq: 783.99  },
  { name: "Sol#",  freq: 830.61  },
  { name: "La",    freq: 880.00  },
  { name: "La#",   freq: 932.33  },
  { name: "Si",    freq: 987.77  },
  { name: "Do''",  freq: 1046.50 },
  { name: "Do#''", freq: 1108.73 },
  { name: "Re''",  freq: 1174.66 },
  { name: "Re#''", freq: 1244.51 },
  { name: "Mi''",  freq: 1318.51 },
  { name: "Fa''",  freq: 1396.91 },
  { name: "Fa#''", freq: 1479.98 },
  { name: "Sol''", freq: 1567.98 },
  { name: "Sol#''",freq: 1661.22 },
  { name: "La''",  freq: 1760.00 },
  { name: "La#''", freq: 1864.66 },
  { name: "Si''",  freq: 1975.53 },
  { name: "Do'''", freq: 2093.00 }
];

const FINGERINGS = {
  "Do":     [1,1,1,1,1,1,1,1],
  "Do#":    [1,1,1,1,1,1,2,1],
  "Re":     [1,1,1,1,1,1,0,1],
  "Re#":    [1,1,1,1,1,2,0,1],
  "Mi":     [1,1,1,1,1,0,0,1],
  "Fa":     [1,1,1,1,0,0,0,1],
  "Fa#":    [1,1,1,0,1,1,1,1],
  "Sol":    [1,1,1,0,0,0,0,1],
  "Sol#":   [1,1,0,1,1,0,0,1],
  "La":     [1,1,0,0,0,0,0,1],
  "La#":    [1,0,1,0,0,0,0,1],
  "Si":     [1,0,0,0,0,0,0,1],
  "Do''":   [0,1,0,0,0,0,0,1],
  "Do#''":  [1,1,0,0,0,0,0,0],
  "Re''":   [0,1,0,0,0,0,0,0],
  "Re#''":  [1,1,1,1,1,2,0,2],
  "Mi''":   [1,1,1,1,1,1,1,1],
  "Fa''":   [1,1,1,1,0,0,0,2],
  "Fa#''":  [1,1,1,0,1,0,0,2],
  "Sol''":  [1,1,1,0,0,0,0,2],
  "Sol#''": [1,1,0,1,0,0,0,2],
  "La''":   [1,1,0,0,0,0,0,2],
  "La#''":  [1,1,0,1,1,1,0,2],
  "Si''":   [1,1,0,1,1,0,0,2],
  "Do'''":  [1,0,0,1,0,0,0,2]
};

const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const btnStart    = document.getElementById('btnStart');
const noteNameEl  = document.getElementById('noteName');
const freqDisplay = document.getElementById('freqDisplay');

function updateFingering(noteName) {
  const fg = noteName ? FINGERINGS[noteName] : null;

  for (let holeIdx = 0; holeIdx <= 7; holeIdx++) {
    const outerEl = document.getElementById(`hole_${holeIdx}_outer`);
    const halfEl  = document.getElementById(`hole_${holeIdx}_half`);
    const innerEl = document.getElementById(`hole_${holeIdx}_inner`);
    if (!outerEl || !halfEl || !innerEl) continue;

    const val = fg ? (holeIdx === 0 ? fg[7] : fg[holeIdx - 1]) : 0;

    outerEl.removeAttribute('filter');

    if (val === 1) {
      outerEl.setAttribute('fill', '#10b981');
      outerEl.setAttribute('stroke', '#059669');
      outerEl.setAttribute('filter', 'url(#glowG)');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#d1fae5');
    } else if (val === 2) {
      outerEl.setAttribute('fill', '#3e2723');
      outerEl.setAttribute('stroke', '#ef4444');
      outerEl.setAttribute('filter', 'url(#glowR)');
      halfEl.setAttribute('fill', '#ef4444');
      innerEl.setAttribute('fill', '#fecaca');
    } else {
      outerEl.setAttribute('fill', '#2d1e18');
      outerEl.setAttribute('stroke', '#8d6e63');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#1b110e');
    }
  }
}

updateFingering(null);

let ws = null;
let wsConnected = false;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    wsConnected = true;
    if (statusDot) statusDot.classList.add('on');
    if (statusText) statusText.textContent = 'Conectado';
    ws.send(JSON.stringify({ type: 'register', device: 'browser' }));
  };

  ws.onclose = () => {
    wsConnected = false;
    if (statusDot) statusDot.classList.remove('on');
    if (statusText) statusText.textContent = 'Desconectado';
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => ws.close();
}
connectWS();

function sendNote(name) {
  if (ws && wsConnected) ws.send(name);
}

let audioCtx, analyser, micStream, isListening = false;
const BUFFER_SIZE = 2048;
let dataBuffer = new Float32Array(BUFFER_SIZE);

function detectarTonoSimple(buffer, sampleRate) {
  let rms = 0;
  for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
  if (Math.sqrt(rms / buffer.length) < 0.012) return -1;

  const minPeriod = Math.floor(sampleRate / 2200);
  const maxPeriod = Math.floor(sampleRate / 450);

  let bestCorr = 0;
  let bestPeriod = -1;

  for (let period = minPeriod; period <= maxPeriod; period++) {
    let corr = 0;
    for (let i = 0; i < maxPeriod; i++) {
      corr += buffer[i] * buffer[i + period];
    }
    if (corr > bestCorr) {
      bestCorr = corr;
      bestPeriod = period;
    }
  }

  return bestPeriod > 0 ? sampleRate / bestPeriod : -1;
}

function matchNote(freq) {
  let best = null, bestDiff = Infinity;
  for (const n of NOTE_TABLE) {
    const diff = Math.abs(freq - n.freq);
    if (diff < bestDiff) {
      bestDiff = diff;
      best = n;
    }
  }
  if (best && bestDiff < best.freq * 0.04) return { note: best };
  return null;
}

let stableCount = 0;
let lastCandidate = '';
let lastSentNote  = '';

function detect() {
  if (!isListening) return;
  analyser.getFloatTimeDomainData(dataBuffer);

  const freq = detectarTonoSimple(dataBuffer, audioCtx.sampleRate);
  if (freq > 400 && freq < 2200) {
    const result = matchNote(freq);
    if (result) {
      const { note } = result;

      if (note.name === lastCandidate) {
        stableCount++;
      } else {
        stableCount = 1;
        lastCandidate = note.name;
      }

      if (stableCount >= 2) {
        if (noteNameEl.textContent !== note.name) {
          noteNameEl.textContent = note.name;
          noteNameEl.classList.remove('pop');
          void noteNameEl.offsetWidth;
          noteNameEl.classList.add('pop');
        }
        freqDisplay.textContent = freq.toFixed(1) + ' Hz';

        updateFingering(note.name);

        if (note.name !== lastSentNote) {
          lastSentNote = note.name;
          sendNote(note.name);
        }
      }
    }
  }

  requestAnimationFrame(detect);
}

btnStart.addEventListener('click', async () => {
  if (!isListening) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = BUFFER_SIZE;
      source.connect(analyser);
      dataBuffer = new Float32Array(BUFFER_SIZE);

      isListening = true;
      btnStart.textContent = 'DETENER';
      btnStart.classList.add('active');
      requestAnimationFrame(detect);
    } catch (e) {
      alert('No se pudo acceder al micrófono: ' + e.message);
    }
  } else {
    isListening = false;
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    btnStart.textContent = 'INICIAR';
    btnStart.classList.remove('active');
    noteNameEl.textContent = '—';
    freqDisplay.textContent = '— Hz';
    updateFingering(null);
    stableCount = 0;
    lastCandidate = '';
    lastSentNote = '';
  }
});
</script>
</body>
</html>
