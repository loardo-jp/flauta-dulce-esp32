<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PFS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }

:root {
  --bg-main: #f4ebd0;
  --text-main: #3e2723;
  --text-muted: #795548;
  --primary: #6d4c41;
  --primary-hover: #4e342e;
  --accent-note: #a0522d;
  --green-led: #10b981;
  --red-led: #ef4444;
}

body {
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.app-container {
  width: 100%;
  max-width: 820px;
  padding: 24px 16px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  text-align: center;
  margin-bottom: 24px;
}
header h1 {
  font-size: 2.6rem;
  font-weight: 800;
  color: var(--text-main);
  letter-spacing: 1px;
}

.top-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 36px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #eae0c8;
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 0.85rem;
  color: var(--text-main);
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ef4444;
  transition: background 0.3s;
}
.status-dot.on {
  background: var(--green-led);
  box-shadow: 0 0 8px var(--green-led);
}

.btn-start {
  padding: 10px 32px;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  color: #ffffff;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(109, 76, 65, 0.25);
  transition: all 0.2s ease;
}
.btn-start:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}
.btn-start:active { transform: scale(0.98); }
.btn-start.active {
  background: #c62828;
  box-shadow: 0 4px 12px rgba(198, 40, 40, 0.35);
}

.btn-usb {
  padding: 10px 24px;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--primary);
  background: transparent;
  border: 2px solid var(--primary);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-usb:hover {
  background: var(--primary);
  color: #fff;
}
.btn-usb.connected {
  background: #2e7d32;
  border-color: #2e7d32;
  color: #fff;
}

.workshop-stage {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: center;
}

@media (max-width: 640px) {
  .workshop-stage {
    grid-template-columns: 1fr;
  }
}

.note-panel {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.note-name {
  font-size: 6rem;
  font-weight: 800;
  color: var(--accent-note);
  min-height: 6.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.note-name.pop {
  animation: pop 0.22s ease;
}
@keyframes pop {
  0%   { transform: scale(0.9); opacity: 0.7; }
  60%  { transform: scale(1.06); }
  100% { transform: scale(1); opacity: 1; }
}

.freq-display {
  font-size: 1.2rem;
  color: var(--text-muted);
  margin-top: 12px;
  font-weight: 600;
}

.legend-mini {
  display: flex;
  gap: 16px;
  margin-top: 32px;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.dot-legend {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 6px;
}

.flute-panel {
  padding: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.flute-svg-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>

    <h1>PFS</h1>
  </header>

<script>
const NOTE_TABLE = [
  { name: "Do",    freq: 523.25  },
  { name: "Do#",   freq: 554.37  },
  { name: "Re",    freq: 587.33  },
  { name: "Re#",   freq: 622.25  },
  { name: "Mi",    freq: 659.26  },
  { name: "Fa",    freq: 698.46  },
  { name: "Fa#",   freq: 739.99  },
  { name: "Sol",   freq: 783.99  },
  { name: "Sol#",  freq: 830.61  },
  { name: "La",    freq: 880.00  },
  { name: "La#",   freq: 932.33  },
  { name: "Si",    freq: 987.77  },
  { name: "Do''",  freq: 1046.50 },
  { name: "Do#''", freq: 1108.73 },
  { name: "Re''",  freq: 1174.66 },
  { name: "Re#''", freq: 1244.51 },
  { name: "Mi''",  freq: 1318.51 },
  { name: "Fa''",  freq: 1396.91 },
  { name: "Fa#''", freq: 1479.98 },
  { name: "Sol''", freq: 1567.98 },
  { name: "Sol#''",freq: 1661.22 },
  { name: "La''",  freq: 1760.00 },
  { name: "La#''", freq: 1864.66 },
  { name: "Si''",  freq: 1975.53 },
  { name: "Do'''", freq: 2093.00 }
];

const FINGERINGS = {
  "Do":     [1,1,1,1,1,1,1,1],
  "Do#":    [1,1,1,1,1,1,2,1],
  "Re":     [1,1,1,1,1,1,0,1],
  "Re#":    [1,1,1,1,1,2,0,1],
  "Mi":     [1,1,1,1,1,0,0,1],
  "Fa":     [1,1,1,1,0,0,0,1],
  "Fa#":    [1,1,1,0,1,1,1,1],
  "Sol":    [1,1,1,0,0,0,0,1],
  "Sol#":   [1,1,0,1,1,0,0,1],
  "La":     [1,1,0,0,0,0,0,1],
  "La#":    [1,0,1,0,0,0,0,1],
  "Si":     [1,0,0,0,0,0,0,1],
  "Do''":   [0,1,0,0,0,0,0,1],
  "Do#''":  [1,1,0,0,0,0,0,0],
  "Re''":   [0,1,0,0,0,0,0,0],
  "Re#''":  [1,1,1,1,1,2,0,2],
  "Mi''":   [1,1,1,1,1,1,1,1],
  "Fa''":   [1,1,1,1,0,0,0,2],
  "Fa#''":  [1,1,1,0,1,0,0,2],
  "Sol''":  [1,1,1,0,0,0,0,2],
  "Sol#''": [1,1,0,1,0,0,0,2],
  "La''":   [1,1,0,0,0,0,0,2],
  "La#''":  [1,1,0,1,1,1,0,2],
  "Si''":   [1,1,0,1,1,0,0,2],
  "Do'''":  [1,0,0,1,0,0,0,2]
};

const btnStart    = document.getElementById('btnStart');
const noteNameEl  = document.getElementById('noteName');
const freqDisplay = document.getElementById('freqDisplay');

function updateFingering(noteName) {
  const fg = noteName ? FINGERINGS[noteName] : null;

  for (let holeIdx = 0; holeIdx <= 7; holeIdx++) {
    const outerEl = document.getElementById(`hole_${holeIdx}_outer`);
    const halfEl  = document.getElementById(`hole_${holeIdx}_half`);
    const innerEl = document.getElementById(`hole_${holeIdx}_inner`);
    if (!outerEl || !halfEl || !innerEl) continue;

    const val = fg ? (holeIdx === 0 ? fg[7] : fg[holeIdx - 1]) : 0;

    outerEl.removeAttribute('filter');

    if (val === 1) {
      outerEl.setAttribute('fill', '#10b981');
      outerEl.setAttribute('stroke', '#059669');
      outerEl.setAttribute('filter', 'url(#glowG)');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#d1fae5');
    } else if (val === 2) {
      outerEl.setAttribute('fill', '#3e2723');
      outerEl.setAttribute('stroke', '#ef4444');
      outerEl.setAttribute('filter', 'url(#glowR)');
      halfEl.setAttribute('fill', '#ef4444');
      innerEl.setAttribute('fill', '#fecaca');
    } else {
      outerEl.setAttribute('fill', '#2d1e18');
      outerEl.setAttribute('stroke', '#8d6e63');
      halfEl.setAttribute('fill', 'transparent');
      innerEl.setAttribute('fill', '#1b110e');
    }
  }
}

updateFingering(null);

let serialPort = null;
let serialWriter = null;
const btnUsb = document.getElementById('btnUsb');

btnUsb.addEventListener('click', async () => {
  if (serialPort) {
    try {
      if (serialWriter) { serialWriter.releaseLock(); serialWriter = null; }
      await serialPort.close();
    } catch (_) {}
    serialPort = null;
    btnUsb.textContent = 'CONECTAR USB';
    btnUsb.classList.remove('connected');
    return;
  }
  try {
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({ baudRate: 115200 });
    serialWriter = serialPort.writable.getWriter();
    btnUsb.textContent = 'USB CONECTADO';
    btnUsb.classList.add('connected');
  } catch (e) {
    serialPort = null;
    serialWriter = null;
    alert('No se pudo conectar al puerto serial: ' + e.message);
  }
});

async function sendNote(name) {
  if (serialWriter) {
    const encoder = new TextEncoder();
    await serialWriter.write(encoder.encode(name + '\n'));
  }
}

// ╔═══════════════════════════════════════════════════════════════════════════╗
// ║  MOTOR DE DETECCIÓN DE PITCH BASADO EN TRANSFORMADA DE FOURIER (DFT)   ║
// ║                                                                         ║
// ║  Sustento teórico (Matemáticas Especiales):                             ║
// ║  • Números complejos: z = a + bi, representados como pares (real, imag) ║
// ║  • Fórmula de Euler: e^{iθ} = cos(θ) + i·sin(θ)                       ║
// ║  • DFT: X[k] = Σ_{n=0}^{N-1} x[n] · e^{-i·2πkn/N}                    ║
// ║  • Las funciones analíticas (holomorfas) que satisfacen las ecuaciones  ║
// ║    de Cauchy-Riemann (∂u/∂x = ∂v/∂y, ∂u/∂y = -∂v/∂x) garantizan que   ║
// ║    el kernel e^{-i2πkn/N} sea diferenciable en el plano complejo,      ║
// ║    condición fundamental para la convergencia de la serie de Fourier.   ║
// ║  • Teorema de Wiener-Khinchin: R(τ) = IFFT(|X(f)|²)                    ║
// ║                                                                         ║
// ║  Ventaja frente al método anterior (autocorrelación por fuerza bruta):  ║
// ║  - El filtro pasa-banda espectral elimina ruido fuera del rango de la   ║
// ║    flauta ANTES de la autocorrelación, evitando falsos picos.           ║
// ║  - El zero-padding interpola el espectro (Δf ≈ 5.4 Hz en vez de ~21 Hz)║
// ║    dando mayor precisión en la estimación del periodo fundamental.      ║
// ║  - La autocorrelación vía FFT es O(N log N) en vez de O(N²).           ║
// ╚═══════════════════════════════════════════════════════════════════════════╝

// Tamaño del zero-padding: 8192 muestras.
// Con fs ≈ 44100 Hz → Δf = fs/N_PAD ≈ 5.38 Hz (resolución espectral).
// El buffer de captura sigue siendo 2048 muestras (latencia ~46 ms).
const N_PAD = 8192;

// ─────────────────────────────────────────────────────────────────────────────
// FFT Cooley-Tukey Radix-2 (Decimación en Tiempo)
// ─────────────────────────────────────────────────────────────────────────────
// Calcula la Transformada Discreta de Fourier in-place.
//
// Fundamento matemático:
//   X[k] = Σ_{n=0}^{N-1} x[n] · e^{-i·2π·k·n / N}
//
// El algoritmo divide recursivamente la DFT de tamaño N en dos DFTs de
// tamaño N/2 (índices pares e impares), y las combina con "factores de
// rotación" (twiddle factors) derivados de la fórmula de Euler:
//   W_N^k = e^{-i·2π·k/N} = cos(2πk/N) - i·sin(2πk/N)
//
// La multiplicación compleja (a+bi)(c+di) = (ac-bd) + (ad+bc)i se programa
// explícitamente sobre los arreglos real/imag, sin usar librerías.
//
// Parámetros: re[] e im[] de longitud N (potencia de 2), modificados in-place.
// ─────────────────────────────────────────────────────────────────────────────
function fft(re, im) {
  const N = re.length;

  // Paso 1: Reordenamiento por bit-reversal.
  // Se permutan los elementos según la inversión binaria de sus índices,
  // de modo que la etapa iterativa de mariposas pueda operar secuencialmente.
  for (let i = 1, j = 0; i < N; i++) {
    let bit = N >> 1;
    while (j & bit) {
      j ^= bit;
      bit >>= 1;
    }
    j ^= bit;
    if (i < j) {
      let tmp;
      tmp = re[i]; re[i] = re[j]; re[j] = tmp;
      tmp = im[i]; im[i] = im[j]; im[j] = tmp;
    }
  }

  // Paso 2: Etapas de mariposa (butterfly), de tamaño 2, 4, 8, …, N.
  for (let size = 2; size <= N; size *= 2) {
    const halfSize = size / 2;

    // Factor de rotación base para esta etapa:
    // W = e^{-i·2π/size} = cos(2π/size) - i·sin(2π/size)   [Euler]
    const angle = -2.0 * Math.PI / size;
    const wRe = Math.cos(angle);
    const wIm = Math.sin(angle);

    for (let start = 0; start < N; start += size) {
      // Factor de rotación acumulado, comienza en W^0 = 1 + 0i
      let curRe = 1.0;
      let curIm = 0.0;

      for (let k = 0; k < halfSize; k++) {
        const evenIdx = start + k;
        const oddIdx  = start + k + halfSize;

        // Multiplicación compleja explícita: twiddle × X[oddIdx]
        // (a+bi)(c+di) = (ac - bd) + (ad + bc)i
        const tRe = curRe * re[oddIdx] - curIm * im[oddIdx];
        const tIm = curRe * im[oddIdx] + curIm * re[oddIdx];

        // Operación mariposa:
        // X_even[k] = X[evenIdx] + W^k · X[oddIdx]
        // X_odd[k]  = X[evenIdx] - W^k · X[oddIdx]
        re[oddIdx]  = re[evenIdx] - tRe;
        im[oddIdx]  = im[evenIdx] - tIm;
        re[evenIdx] += tRe;
        im[evenIdx] += tIm;

        // Avanzar factor de rotación: W^{k+1} = W^k · W
        const nextRe = curRe * wRe - curIm * wIm;
        const nextIm = curRe * wIm + curIm * wRe;
        curRe = nextRe;
        curIm = nextIm;
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// IFFT (Transformada Inversa de Fourier)
// ─────────────────────────────────────────────────────────────────────────────
// x[n] = (1/N) · Σ_{k=0}^{N-1} X[k] · e^{+i·2π·k·n / N}
//
// Se implementa conjugando la entrada, aplicando la FFT directa, conjugando
// la salida y dividiendo por N. Esto es equivalente a usar el exponente
// positivo (+i) en vez del negativo (-i) de la DFT directa.
// ─────────────────────────────────────────────────────────────────────────────
function ifft(re, im) {
  const N = re.length;

  // Conjugar entrada: cambiar signo de la parte imaginaria
  for (let i = 0; i < N; i++) im[i] = -im[i];

  // Aplicar FFT directa
  fft(re, im);

  // Conjugar salida y normalizar por 1/N
  for (let i = 0; i < N; i++) {
    re[i] =  re[i] / N;
    im[i] = -im[i] / N;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// detectPitchFFT(buffer, sampleRate)
// ─────────────────────────────────────────────────────────────────────────────
// Detector de pitch (frecuencia fundamental) basado en:
//   1. Zero-padding del buffer a N_PAD muestras
//   2. FFT manual (Cooley-Tukey radix-2)
//   3. Filtro pasa-banda espectral [400, 2200] Hz
//   4. Autocorrelación vía Teorema de Wiener-Khinchin:
//        R(τ) = IFFT( |FFT(x)|² )
//   5. Búsqueda de pico en R(τ) con interpolación parabólica sub-muestra
//
// Retorna frecuencia en Hz o -1 si no hay pitch detectable.
// ─────────────────────────────────────────────────────────────────────────────
function detectPitchFFT(buffer, sampleRate) {

  // ── Paso 0: Detección de silencio (RMS) ──
  let rms = 0;
  for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
  rms = Math.sqrt(rms / buffer.length);
  if (rms < 0.012) return -1;

  // ── Paso 1: Zero-padding ──
  // Se rellena con ceros hasta N_PAD. Esto NO añade información nueva,
  // pero interpola el espectro discreto, reduciendo Δf de ~21.5 Hz
  // (fs/2048) a ~5.4 Hz (fs/8192), lo que mejora la precisión del pico
  // espectral sin aumentar la latencia de captura.
  const re = new Float64Array(N_PAD);
  const im = new Float64Array(N_PAD);
  for (let i = 0; i < buffer.length; i++) re[i] = buffer[i];
  // im[] ya está inicializado a ceros (señal real pura, parte imaginaria = 0)

  // ── Paso 2: FFT (Transformada Discreta de Fourier) ──
  // Calcula X[k] = Σ x[n] · e^{-i2πkn/N}  usando Cooley-Tukey radix-2.
  // Cada X[k] es un número complejo (re[k] + i·im[k]).
  fft(re, im);

  // ── Paso 3: Filtro pasa-banda espectral [400, 2200] Hz ──
  // Se anulan los bins k cuya frecuencia f_k = k·fs/N_PAD esté fuera
  // del rango de la flauta dulce soprano. Esto elimina ruido de baja
  // frecuencia (voz, vibración) y alta frecuencia (sibilancias, ruido
  // electrónico) ANTES de calcular la autocorrelación.
  const binLow  = Math.floor(400  * N_PAD / sampleRate);
  const binHigh = Math.ceil(2200 * N_PAD / sampleRate);

  for (let k = 0; k < N_PAD; k++) {
    // Filtrar tanto frecuencias positivas como negativas (espectro simétrico)
    const kMirror = N_PAD - k;
    const inBand = (k >= binLow && k <= binHigh) ||
                   (kMirror >= binLow && kMirror <= binHigh);
    if (!inBand) {
      re[k] = 0;
      im[k] = 0;
    }
  }

  // ── Paso 4: Espectro de potencia |X[k]|² ──
  // P[k] = Re(X[k])² + Im(X[k])² = |X[k]|²
  // Este es el paso clave del Teorema de Wiener-Khinchin:
  // la autocorrelación de una señal es la IFFT de su espectro de potencia.
  const pRe = new Float64Array(N_PAD);
  const pIm = new Float64Array(N_PAD);
  for (let k = 0; k < N_PAD; k++) {
    pRe[k] = re[k] * re[k] + im[k] * im[k];
    pIm[k] = 0; // |X|² es real puro
  }

  // ── Paso 5: IFFT → Autocorrelación R(τ) ──
  // R(τ) = IFFT(|X(f)|²)
  // La parte real de R contiene la función de autocorrelación.
  // R(0) es la energía total; buscamos el primer pico para τ > 0
  // que corresponde al periodo fundamental de la señal.
  ifft(pRe, pIm);

  // ── Paso 6: Búsqueda de pico fundamental en R(τ) ──
  // El rango de búsqueda se limita a periodos correspondientes a
  // frecuencias entre 400 Hz y 2200 Hz de la flauta dulce soprano:
  //   τ_min = fs / f_max,  τ_max = fs / f_min
  const tauMin = Math.floor(sampleRate / 2200);
  const tauMax = Math.ceil(sampleRate / 400);
  const searchMax = Math.min(tauMax, N_PAD / 2);

  // Normalización: R(0) es la energía máxima (autocorrelación en lag=0)
  const r0 = pRe[0];
  if (r0 < 1e-10) return -1;

  let bestTau = -1;
  let bestVal = -Infinity;

  // Buscar el primer pico significativo (> 40% de R(0)),
  // que corresponde a la frecuencia fundamental, no a un armónico.
  for (let tau = tauMin; tau <= searchMax; tau++) {
    const val = pRe[tau] / r0;
    if (val > bestVal) {
      bestVal = val;
      bestTau = tau;
    }
  }

  // Umbral: el pico debe ser al menos 40% de la energía total
  if (bestTau < 1 || bestVal < 0.40) return -1;

  // ── Paso 7: Interpolación parabólica sub-muestra ──
  // Se ajusta una parábola por los 3 puntos (τ-1, τ, τ+1) para
  // estimar el verdadero máximo con resolución fraccional.
  // δ = 0.5 · (R[τ-1] - R[τ+1]) / (R[τ-1] - 2·R[τ] + R[τ+1])
  // τ_interp = τ + δ
  const prev = (bestTau > 0)         ? pRe[bestTau - 1] : pRe[bestTau];
  const curr =                          pRe[bestTau];
  const next = (bestTau < N_PAD - 1) ? pRe[bestTau + 1] : pRe[bestTau];

  const denom = prev - 2.0 * curr + next;
  let tauInterp = bestTau;
  if (Math.abs(denom) > 1e-12) {
    const delta = 0.5 * (prev - next) / denom;
    tauInterp = bestTau + delta;
  }

  // Frecuencia fundamental = fs / τ
  if (tauInterp <= 0) return -1;
  return sampleRate / tauInterp;
}

let audioCtx, analyser, micStream, isListening = false;
const BUFFER_SIZE = 2048;
let dataBuffer = new Float32Array(BUFFER_SIZE);

function matchNote(freq) {
  let best = null, bestDiff = Infinity;
  for (const n of NOTE_TABLE) {
    const diff = Math.abs(freq - n.freq);
    if (diff < bestDiff) {
      bestDiff = diff;
      best = n;
    }
  }
  if (best && bestDiff < best.freq * 0.04) return { note: best };
  return null;
}

let stableCount = 0;
let lastCandidate = '';
let lastSentNote  = '';

function detect() {
  if (!isListening) return;
  analyser.getFloatTimeDomainData(dataBuffer);

  const freq = detectPitchFFT(dataBuffer, audioCtx.sampleRate);
  if (freq > 400 && freq < 2200) {
    const result = matchNote(freq);
    if (result) {
      const { note } = result;

      if (note.name === lastCandidate) {
        stableCount++;
      } else {
        stableCount = 1;
        lastCandidate = note.name;
      }

      if (stableCount >= 2) {
        if (noteNameEl.textContent !== note.name) {
          noteNameEl.textContent = note.name;
          noteNameEl.classList.remove('pop');
          void noteNameEl.offsetWidth;
          noteNameEl.classList.add('pop');
        }
        freqDisplay.textContent = freq.toFixed(1) + ' Hz';

        updateFingering(note.name);

        if (note.name !== lastSentNote) {
          lastSentNote = note.name;
          sendNote(note.name);
        }
      }
    }
  }

  requestAnimationFrame(detect);
}

btnStart.addEventListener('click', async () => {
  if (!isListening) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = BUFFER_SIZE;
      source.connect(analyser);
      dataBuffer = new Float32Array(BUFFER_SIZE);

      isListening = true;
      btnStart.textContent = 'DETENER';
      btnStart.classList.add('active');
      requestAnimationFrame(detect);
    } catch (e) {
      alert('No se pudo acceder al micrófono: ' + e.message);
    }
  } else {
    isListening = false;
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    btnStart.textContent = 'INICIAR';
    btnStart.classList.remove('active');
    noteNameEl.textContent = '—';
    freqDisplay.textContent = '— Hz';
    updateFingering(null);
    stableCount = 0;
    lastCandidate = '';
    lastSentNote = '';
  }
});
</script>
